<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STRATOS V7 | FAHIM EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Mono:wght@400;700&display=swap');
        
        :root { --neon-red: #ff003c; --neon-cyan: #00f2ff; --bg: #020202; }
        body { background: var(--bg); color: #fff; font-family: 'Space Mono', monospace; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        .syncopate { font-family: 'Syncopate', sans-serif; }
        
        /* Tactical Hexagon Grid Background */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 30px 30px; z-index: -1;
        }

        /* Glassmorphism Tactical Card */
        .intel-card {
            background: rgba(15, 15, 18, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            border-radius: 2px 20px 2px 20px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .intel-card:active { transform: scale(0.96); border-color: var(--neon-cyan); }

        .status-critical { border-left: 4px solid var(--neon-red); }
        .status-info { border-left: 4px solid var(--neon-cyan); }

        /* Scanning HUD */
        .hud-line { position: fixed; width: 100%; height: 1px; background: rgba(0, 242, 255, 0.15); z-index: 99; pointer-events: none; animation: scanH 5s linear infinite; }
        @keyframes scanH { 0% { top: 0%; } 100% { top: 100%; } }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--neon-red); border-radius: 10px; }

        /* Circular Pulse for Active Nodes */
        .node-pulse { width: 6px; height: 6px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 10px #22c55e; animation: pulseNode 1.5s infinite; }
        @keyframes pulseNode { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        marquee { font-size: 10px; color: var(--neon-cyan); letter-spacing: 2px; }
    </style>
</head>
<body class="p-4 pt-20">

    <div class="hud-line"></div>

    <header class="fixed top-0 left-0 w-full z-50 bg-black/90 border-b border-white/5 px-5 py-3 backdrop-blur-md">
        <div class="flex justify-between items-center mb-1">
            <div class="flex items-center gap-3">
                <div class="text-[10px] bg-red-600 text-black px-1 font-bold syncopate">STRATOS V7</div>
                <h1 class="text-[10px] tracking-widest text-gray-400 syncopate">OPERATOR: <span class="text-white">FAHIM</span></h1>
            </div>
            <div class="flex items-center gap-2">
                <span id="sys-clock" class="text-[10px] font-bold text-white">00:00:00</span>
                <div class="node-pulse"></div>
            </div>
        </div>
        <marquee scrollamount="4">SIGNAL INTERCEPTED... REGION: MIDDLE-EAST... MONITORING: ISRAEL, IRAN, USA, LEBANON... BY FAHIM.INTEL</marquee>
    </header>

    <div class="grid grid-cols-3 gap-2 mb-6">
        <div class="intel-card p-3 text-center border-t-2 border-red-500">
            <div class="text-[8px] text-gray-500 uppercase">Critical</div>
            <div id="high-alert" class="text-lg font-bold text-red-500">00</div>
        </div>
        <div class="intel-card p-3 text-center border-t-2 border-cyan-500">
            <div class="text-[8px] text-gray-500 uppercase">Neutral</div>
            <div id="mid-alert" class="text-lg font-bold text-cyan-500">00</div>
        </div>
        <div class="intel-card p-3 text-center border-t-2 border-white/20">
            <div class="text-[8px] text-gray-500 uppercase">Voice AI</div>
            <button onclick="toggleVoice()" id="voice-btn" class="text-[10px] font-bold text-white uppercase"><i class="fa-solid fa-volume-xmark"></i> OFF</button>
        </div>
    </div>

    <div id="intel-stream" class="space-y-4">
        <div class="intel-card h-32 animate-pulse opacity-20"></div>
        <div class="intel-card h-32 animate-pulse opacity-20"></div>
    </div>

    <div class="fixed bottom-0 left-0 w-full p-4 bg-gradient-to-t from-black via-black/80 to-transparent z-50">
        <div class="flex justify-between items-center max-w-lg mx-auto bg-white/5 border border-white/10 p-2 rounded-xl backdrop-blur-xl">
            <div class="px-4">
                <div class="text-[7px] text-gray-500 uppercase">Sync: <span id="sync-timer" class="text-white">60s</span></div>
                <div class="text-[8px] font-bold text-blue-400">FAHIM_CORE_V7</div>
            </div>
            
            <button onclick="interceptSignal()" class="w-12 h-12 bg-red-600 rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(255,0,0,0.4)] active:scale-90 transition-transform">
                <i class="fa-solid fa-satellite"></i>
            </button>

            <div class="px-4 text-right">
                <div class="text-[7px] text-gray-500 uppercase">Status</div>
                <div class="text-[8px] font-bold text-green-500 uppercase tracking-tighter italic">Secured</div>
            </div>
        </div>
    </div>

    <script>
        let isVoiceEnabled = false;
        let lastTopNews = "";
        let countdown = 60;
        const API_RSS = 'https://api.rss2json.com/v1/api.json?rss_url=';
        const FEEDS = [
            'https://www.aljazeera.com/xml/rss/all.xml',
            'http://feeds.bbci.co.uk/news/world/middle_east/rss.xml',
            'https://www.timesofisrael.com/feed/'
        ];

        function toggleVoice() {
            isVoiceEnabled = !isVoiceEnabled;
            const btn = document.getElementById('voice-btn');
            btn.innerHTML = isVoiceEnabled ? '<i class="fa-solid fa-volume-high text-green-400"></i> ON' : '<i class="fa-solid fa-volume-xmark"></i> OFF';
            if(isVoiceEnabled) speak("Stratos Intelligence System Active. Developed by Fahim.");
        }

        function speak(text) {
            if (!isVoiceEnabled) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.rate = 1.1;
            msg.pitch = 0.8;
            window.speechSynthesis.speak(msg);
        }

        async function interceptSignal() {
            const stream = document.getElementById('intel-stream');
            let masterList = [];
            let stats = { h: 0, m: 0 };

            try {
                for(let feed of FEEDS) {
                    const r = await fetch(API_RSS + encodeURIComponent(feed));
                    const d = await r.json();
                    if(d.items) masterList = [...masterList, ...d.items];
                }

                const filtered = masterList.filter(i => 
                    /Israel|Iran|USA|Palestine|Strike|Hezbollah|Attack|Military|War/i.test(i.title)
                ).sort((a,b) => new Date(b.pubDate) - new Date(a.pubDate));

                if(filtered.length > 0 && filtered[0].title !== lastTopNews) {
                    lastTopNews = filtered[0].title;
                    speak("Attention. New intelligence received: " + lastTopNews);
                }

                stream.innerHTML = filtered.slice(0, 15).map(item => {
                    const isDanger = /attack|strike|explosion|dead|bomb|kill/i.test(item.title);
                    isDanger ? stats.h++ : stats.m++;
                    
                    return `
                        <div class="intel-card p-5 ${isDanger ? 'status-critical' : 'status-info'}">
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-[8px] font-bold text-red-500 uppercase tracking-widest">${new URL(item.link).hostname.split('.')[1]}</span>
                                <span class="text-[8px] text-gray-500 mono">${new Date(item.pubDate).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                            </div>
                            <h2 class="text-sm font-bold text-white mb-2 leading-tight uppercase">
                                <a href="${item.link}" target="_blank">${item.title}</a>
                            </h2>
                            <p class="text-[10px] text-gray-400 line-clamp-2 italic">${item.description.replace(/<[^>]*>?/gm, '')}</p>
                            <div class="mt-3 flex gap-2">
                                <span class="text-[7px] border border-white/10 px-1 text-gray-500">VERIFIED</span>
                                <span class="text-[7px] border border-red-500/20 px-1 text-red-500">FAHIM_LNK</span>
                            </div>
                        </div>
                    `;
                }).join('');

                document.getElementById('high-alert').innerText = stats.h.toString().padStart(2, '0');
                document.getElementById('mid-alert').innerText = stats.m.toString().padStart(2, '0');

            } catch(e) { console.error("Signal Lost"); }
        }

        setInterval(() => {
            document.getElementById('sys-clock').innerText = new Date().toLocaleTimeString('en-GB');
            countdown--;
            document.getElementById('sync-timer').innerText = countdown + 's';
            if(countdown <= 0) { countdown = 60; interceptSignal(); }
        }, 1000);

        window.onload = interceptSignal;
    </script>
</body>
</html>
